name: Release and Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: |
          OUTPUT=$(npm publish --provenance --access public 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then
            grep -qiE "previously published|cannot publish over|version already exists" <<< "$OUTPUT" || exit $RC
            echo "Version already published, skipping."
          fi

  publish-gh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@stafloker'
      - name: Publish to GitHub Packages
        run: |
          OUTPUT=$(npm publish 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then
            grep -qiE "previously published|cannot publish over|version already exists" <<< "$OUTPUT" || exit $RC
            echo "Version already published, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [publish-npm, publish-gh]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            # @stafloker/docusaurus-plugin-image-zoom ${{ steps.version.outputs.tag }}

            ## Changelog

            ${{ steps.changelog.outputs.notes }}

            ## Install

            ### npm — Latest
            ```bash
            npm install @stafloker/docusaurus-plugin-image-zoom
            ```

            ### npm — Versioned
            ```bash
            npm install @stafloker/docusaurus-plugin-image-zoom@${{ steps.version.outputs.version }}
            ```

            ### GitHub Packages
            ```bash
            npm install @stafloker/docusaurus-plugin-image-zoom@${{ steps.version.outputs.version }} --registry=https://npm.pkg.github.com
            ```
